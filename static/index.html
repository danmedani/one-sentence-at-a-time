<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>One Sentence at a Time</title>
<style>
  :root {
    --bg: #faf8f3;
    --panel: #ffffff;
    --ink: #1f1d1a;
    --muted: #6b665e;
    --accent: #2b5d8a;
    --accent-soft: #e6eff7;
    --border: #e6e1d6;
    --pending: #fff7d6;
    --pending-border: #e8d77a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    position: sticky; top: 0; z-index: 5;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header select, header button, header input {
    font: inherit;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: white;
  }
  header button { cursor: pointer; }
  header button:hover { background: var(--accent-soft); }
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  .story {
    font: 18px/1.7 "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 28px;
    min-height: 120px;
    word-wrap: break-word;
  }
  .story.empty { color: var(--muted); font-style: italic; padding: 24px 28px; }
  .paragraph {
    position: relative;
    padding: 8px 0;
    margin: 0;
    border-radius: 6px;
  }
  .paragraph + .paragraph { margin-top: 12px; }
  .paragraph .actions {
    position: absolute;
    top: 6px;
    right: -4px;
    display: none;
    gap: 4px;
  }
  .paragraph:hover { background: #fbf9f3; }
  .paragraph:hover .actions { display: flex; }
  .paragraph .actions button {
    font: 12px/1 inherit;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    cursor: pointer;
    color: var(--muted);
  }
  .paragraph .actions button:hover { color: var(--ink); border-color: var(--accent); }
  .paragraph .actions button.danger:hover { color: #a4341c; border-color: #a4341c; }
  .paragraph textarea {
    width: 100%;
    font: inherit;
    padding: 8px 10px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: white;
    resize: vertical;
    min-height: 80px;
  }
  .paragraph .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
  .paragraph .edit-actions button {
    font: 13px/1 inherit;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    cursor: pointer;
  }
  .paragraph .edit-actions button.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .hint-row {
    display: flex; gap: 8px; margin-top: 24px;
  }
  .hint-row input {
    flex: 1;
    font: inherit;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
  }
  .hint-row button {
    font: inherit;
    padding: 10px 16px;
    background: var(--accent);
    color: white;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
  }
  .hint-row button.secondary {
    background: white;
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .hint-row button.secondary:hover { background: var(--accent-soft); }
  .hint-row button:hover { filter: brightness(1.08); }
  .hint-row button:disabled { opacity: .55; cursor: wait; }
  .suggestions { margin-top: 18px; display: grid; gap: 8px; }
  .suggestion {
    text-align: left;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font: inherit;
    cursor: pointer;
    line-height: 1.5;
  }
  .suggestion:hover { background: var(--accent-soft); border-color: var(--accent); }
  .pending {
    margin-top: 22px;
    background: var(--pending);
    border: 1px solid var(--pending-border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .pending-label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
  .pending-text {
    width: 100%;
    font: 18px/1.7 "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    margin-bottom: 12px;
    padding: 8px 10px;
    border: 1px solid var(--pending-border);
    border-radius: 6px;
    background: #fffdf2;
    resize: vertical;
    min-height: 60px;
  }
  .pending-text:focus { outline: 2px solid var(--accent); outline-offset: -2px; }
  .pending-actions { display: flex; gap: 8px; }
  .pending-actions input {
    flex: 1; font: inherit; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 6px; background: white;
  }
  .pending-actions button {
    font: inherit; padding: 8px 14px;
    border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer;
  }
  .pending-actions button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .pending-actions button.primary:hover { filter: brightness(1.08); }
  .pending-actions button:disabled { opacity: .55; cursor: wait; }
  .status { color: var(--muted); font-size: 13px; min-height: 18px; margin-top: 10px; }
  .error { color: #a4341c; }
</style>
</head>
<body>
<header>
  <h1>One Sentence at a Time</h1>
  <select id="story-select"></select>
  <button id="new-story-btn">+ New story</button>
  <button id="download-btn">Download</button>
  <span style="flex:1"></span>
  <span class="status" id="status"></span>
</header>

<main>
  <div class="story empty" id="story-text">Pick a story or create a new one to begin.</div>

  <div class="hint-row">
    <input id="hint-input" placeholder="Optional: a word or two to steer the next sentence..." />
    <button id="suggest-btn">Suggest next sentences</button>
    <button id="paragraph-btn" class="secondary" title="Start a new paragraph before the next sentence">¶ New paragraph</button>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div class="pending" id="pending" hidden>
    <div class="pending-label">Pending sentence (edit freely)</div>
    <textarea class="pending-text" id="pending-text" rows="2" spellcheck="true"></textarea>
    <div class="pending-actions">
      <input id="tweak-input" placeholder="Tweak instruction (e.g. 'shorter', 'more ominous')..." />
      <button id="tweak-btn">Tweak</button>
      <button id="commit-btn" class="primary">Commit</button>
      <button id="discard-btn">Discard</button>
    </div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const state = {
  story: null,
  text: "",
  pending: null,
  editingIdx: null,
};

function splitParagraphs(text) {
  if (!text) return [];
  return text.split(/\n\n+/).map((p) => p.replace(/^\s+|\s+$/g, "")).filter((p) => p.length > 0);
}

function joinParagraphs(paragraphs) {
  return paragraphs.join("\n\n");
}

function setStatus(msg, isError = false) {
  const el = $("status");
  el.textContent = msg || "";
  el.classList.toggle("error", !!isError);
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

function renderStoryText() {
  const el = $("story-text");
  el.innerHTML = "";
  if (!state.story) {
    el.textContent = "Pick a story or create a new one to begin.";
    el.classList.add("empty");
    return;
  }
  const paragraphs = splitParagraphs(state.text);
  if (paragraphs.length === 0) {
    el.textContent = "(empty — your first sentence will start the story)";
    el.classList.add("empty");
    return;
  }
  el.classList.remove("empty");
  paragraphs.forEach((p, idx) => el.appendChild(renderParagraph(p, idx)));
}

function renderParagraph(text, idx) {
  const wrap = document.createElement("div");
  wrap.className = "paragraph";

  if (state.editingIdx === idx) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.rows = Math.max(2, Math.min(10, text.split(/\s+/).length / 12 | 0));
    wrap.appendChild(ta);

    const actions = document.createElement("div");
    actions.className = "edit-actions";
    const save = document.createElement("button");
    save.textContent = "Save";
    save.className = "primary";
    save.onclick = () => saveParagraph(idx, ta.value);
    const cancel = document.createElement("button");
    cancel.textContent = "Cancel";
    cancel.onclick = () => { state.editingIdx = null; renderStoryText(); };
    actions.appendChild(save);
    actions.appendChild(cancel);
    wrap.appendChild(actions);
    setTimeout(() => ta.focus(), 0);
    return wrap;
  }

  const body = document.createElement("span");
  body.textContent = text;
  wrap.appendChild(body);

  const actions = document.createElement("div");
  actions.className = "actions";
  const edit = document.createElement("button");
  edit.textContent = "Edit";
  edit.onclick = () => { state.editingIdx = idx; renderStoryText(); };
  const del = document.createElement("button");
  del.className = "danger";
  del.textContent = "Delete";
  del.onclick = () => deleteParagraph(idx);
  actions.appendChild(edit);
  actions.appendChild(del);
  wrap.appendChild(actions);
  return wrap;
}

async function saveStoryText(newText) {
  const { text } = await api(`/api/stories/${encodeURIComponent(state.story)}`, {
    method: "PUT",
    body: JSON.stringify({ text: newText }),
  });
  state.text = text;
}

async function saveParagraph(idx, newText) {
  const cleaned = newText.replace(/^\s+|\s+$/g, "");
  if (!cleaned) {
    if (!confirm("Paragraph is empty — delete it?")) return;
    return deleteParagraph(idx);
  }
  const paragraphs = splitParagraphs(state.text);
  paragraphs[idx] = cleaned;
  setStatus("Saving...");
  try {
    await saveStoryText(joinParagraphs(paragraphs));
    state.editingIdx = null;
    renderStoryText();
    setStatus("Saved.");
  } catch (e) {
    setStatus(e.message, true);
  }
}

async function deleteParagraph(idx) {
  if (!confirm("Delete this paragraph?")) return;
  const paragraphs = splitParagraphs(state.text);
  paragraphs.splice(idx, 1);
  setStatus("Deleting...");
  try {
    await saveStoryText(joinParagraphs(paragraphs));
    state.editingIdx = null;
    renderStoryText();
    setStatus("Deleted.");
  } catch (e) {
    setStatus(e.message, true);
  }
}

function renderSuggestions(sentences) {
  const c = $("suggestions");
  c.innerHTML = "";
  for (const s of sentences) {
    const btn = document.createElement("button");
    btn.className = "suggestion";
    btn.textContent = s;
    btn.onclick = () => choosePending(s);
    c.appendChild(btn);
  }
}

function renderPending() {
  const wrap = $("pending");
  if (state.pending === null) {
    wrap.hidden = true;
    return;
  }
  wrap.hidden = false;
  const ta = $("pending-text");
  if (ta.value !== state.pending) ta.value = state.pending;
}

async function loadStories(selectName = null) {
  const { stories } = await api("/api/stories");
  const sel = $("story-select");
  sel.innerHTML = "";
  if (stories.length === 0) {
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "(no stories yet)";
    sel.appendChild(opt);
  } else {
    for (const name of stories) {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    }
  }
  if (selectName && stories.includes(selectName)) {
    sel.value = selectName;
    await selectStory(selectName);
  } else if (stories.length > 0) {
    sel.value = stories[0];
    await selectStory(stories[0]);
  } else {
    state.story = null;
    state.text = "";
    state.pending = null;
    renderStoryText();
    renderSuggestions([]);
    renderPending();
  }
}

async function selectStory(name) {
  state.story = name;
  state.pending = null;
  state.editingIdx = null;
  $("suggestions").innerHTML = "";
  const { text } = await api(`/api/stories/${encodeURIComponent(name)}`);
  state.text = text;
  renderStoryText();
  renderPending();
  setStatus("");
}

async function suggest() {
  if (!state.story) {
    setStatus("Select or create a story first.", true);
    return;
  }
  const hint = $("hint-input").value.trim();
  setStatus("Thinking...");
  $("suggest-btn").disabled = true;
  try {
    const { sentences } = await api("/api/suggest", {
      method: "POST",
      body: JSON.stringify({ name: state.story, hint: hint || null }),
    });
    renderSuggestions(sentences);
    setStatus(`${sentences.length} suggestions.`);
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    $("suggest-btn").disabled = false;
  }
}

function choosePending(sentence) {
  state.pending = sentence;
  $("suggestions").innerHTML = "";
  $("tweak-input").value = "";
  renderPending();
  $("tweak-input").focus();
}

async function tweak() {
  if (!state.pending) return;
  const instruction = $("tweak-input").value.trim();
  if (!instruction) return;
  setStatus("Re-suggesting...");
  $("tweak-btn").disabled = true;
  try {
    const { sentences } = await api("/api/tweak", {
      method: "POST",
      body: JSON.stringify({
        name: state.story,
        sentence: state.pending,
        instruction,
      }),
    });
    renderSuggestions(sentences);
    $("tweak-input").value = "";
    setStatus(`${sentences.length} new suggestions.`);
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    $("tweak-btn").disabled = false;
  }
}

async function commit() {
  if (!state.pending) return;
  setStatus("Committing...");
  $("commit-btn").disabled = true;
  try {
    const { text } = await api(`/api/stories/${encodeURIComponent(state.story)}/append`, {
      method: "POST",
      body: JSON.stringify({ sentence: state.pending }),
    });
    state.text = text;
    state.pending = null;
    $("hint-input").value = "";
    $("suggestions").innerHTML = "";
    renderStoryText();
    renderPending();
    setStatus("Committed. Click 'Suggest' for the next sentence.");
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    $("commit-btn").disabled = false;
  }
}

function discard() {
  state.pending = null;
  renderPending();
  setStatus("Discarded.");
}

async function newParagraph() {
  if (!state.story) {
    setStatus("Select or create a story first.", true);
    return;
  }
  if (!state.text.trim()) {
    setStatus("Story is empty — write a sentence first.", true);
    return;
  }
  setStatus("Adding paragraph break...");
  $("paragraph-btn").disabled = true;
  try {
    const { text } = await api(`/api/stories/${encodeURIComponent(state.story)}/paragraph`, {
      method: "POST",
    });
    state.text = text;
    renderStoryText();
    setStatus("New paragraph started — next committed sentence will start it.");
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    $("paragraph-btn").disabled = false;
  }
}

function downloadStory() {
  if (!state.story) {
    setStatus("Select a story first.", true);
    return;
  }
  window.location = `/api/stories/${encodeURIComponent(state.story)}/download`;
}

async function newStory() {
  const name = prompt("Name for the new story (letters, numbers, spaces, _ or -):");
  if (!name) return;
  try {
    await api("/api/stories", {
      method: "POST",
      body: JSON.stringify({ name: name.trim() }),
    });
    await loadStories(name.trim());
    setStatus(`Created "${name.trim()}".`);
  } catch (e) {
    setStatus(e.message, true);
  }
}

$("story-select").addEventListener("change", (e) => selectStory(e.target.value));
$("new-story-btn").addEventListener("click", newStory);
$("download-btn").addEventListener("click", downloadStory);
$("paragraph-btn").addEventListener("click", newParagraph);
$("suggest-btn").addEventListener("click", suggest);
$("tweak-btn").addEventListener("click", tweak);
$("commit-btn").addEventListener("click", commit);
$("discard-btn").addEventListener("click", discard);
$("hint-input").addEventListener("keydown", (e) => { if (e.key === "Enter") suggest(); });
$("tweak-input").addEventListener("keydown", (e) => { if (e.key === "Enter") tweak(); });
$("pending-text").addEventListener("input", (e) => { state.pending = e.target.value; });

loadStories().catch((e) => setStatus(e.message, true));
</script>
</body>
</html>
